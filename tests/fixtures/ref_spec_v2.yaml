openapi: "3.0.3"
info:
  title: Ref Test API v2
  version: "2.0.0"
paths:
  /users:
    get:
      summary: List users
      operationId: listUsers
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserList"
  /users/bulk:
    post:
      summary: Bulk create users
      operationId: bulkCreateUsers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  schemas:
    User:
      type: object
      required: [id, email, username]
      properties:
        id:
          type: integer
        email:
          type: string
        username:
          type: string
    UserList:
      type: object
      required: [users, page]
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: string
        page:
          type: integer
    CreateUserRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: integer
        name:
          type: string
    Error:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
